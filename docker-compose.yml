services:
  web:
    image: node:20-alpine
    container_name: antonio-romero-web
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "${WEB_PORT}:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"